general {
    lock_cmd = pidof hyprlock || hyprlock       # Running lock command
    before_sleep_cmd = loginctl lock-session    # Lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # Ensures the screen turns back on after waking up
}

# Dim screen after 2.5 minutes
listener {
    timeout = 150                                
    on-timeout = brightnessctl set 10%          # set monitor backlight to 10%
    on-resume = brightnessctl set 100%          # restore monitor backlight
}

listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 600                                # 10 minutes
    on-timeout = systemctl suspend
}
